<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .custom-input-h {
      height: 32px;
    }
    .wireframe-bg {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M54.627 0l.83.83L1.242 55.444l-.83-.83L54.627 0zm-2.737 0l.83.83L0 52.708l-.83-.83L51.89 0zm-2.737 0l.83.83L0 49.97l-.83-.83L49.153 0z' fill='%234F8EF7' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
    }

<body class="bg-bg-primary text-text-primary min-h-screen flex selection:bg-severity-low/30">
<!-- Left Panel: Minimalist Wireframe -->
<div class="hidden lg:flex w-1/2 relative overflow-hidden border-r border-border-subtle wireframe-bg">
<div class="absolute inset-0 flex items-center justify-center pointer-events-none p-12">
<div class="w-full h-full border border-border-subtle/30 relative">
<div class="absolute top-0 left-0 w-8 h-8 border-t border-l border-severity-low/40"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t border-r border-severity-low/40"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b border-l border-severity-low/40"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b border-r border-severity-low/40"></div>
<!-- Abstract Network Plot -->
<div class="flex flex-col items-center justify-center h-full opacity-20">
<span class="material-symbols-outlined text-[160px] text-severity-low" data-icon="lan">lan</span>
<div class="mt-8 font-mono-code text-label-caps text-severity-low uppercase tracking-[0.3em]">System Topology: Active</div>
</div>
</div>
</div>
<!-- Decorative Meta -->
<div class="absolute bottom-8 left-8 flex flex-col gap-1 font-mono-code text-[10px] text-text-tertiary">
<div>LATENCY: 12ms</div>
<div>ENCRYPTION: AES-256-GCM</div>
<div>CORE: PENTAI-NODE-ALPHA</div>
</div>
</div>
<!-- Right Panel: Login Form -->
<div class="w-full lg:w-1/2 flex flex-col justify-center items-center px-6 lg:px-24">
<div class="w-full max-w-sm">
<!-- Header Area -->
<div class="mb-10">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-severity-low" data-icon="security">security</span>
<span class="font-mono-code text-label-caps text-severity-low">SECURE GATEWAY</span>
</div>
<h2 class="font-h2 text-h2 uppercase tracking-tight text-text-primary">AUTHENTICATION REQUIRED</h2>
<div class="h-1 w-12 bg-severity-low mt-2"></div>
</div>
<!-- Login Form -->
<form class="space-y-6">
<div>
<label class="block font-mono-code text-label-caps text-text-secondary uppercase mb-2" for="uid">Operator ID</label>
<div class="relative">
<input class="w-full custom-input-h bg-surface-container-lowest border border-border-subtle rounded-none px-3 text-text-primary font-mono-code text-body-sm focus:ring-0 focus:border-severity-low transition-colors placeholder:text-text-tertiary/50" id="uid" name="uid" placeholder="NODE_ID_..." type="text"/>
</div>
</div>
<div>
<label class="block font-mono-code text-label-caps text-text-secondary uppercase mb-2" for="key">Access Key</label>
<div class="relative">
<input class="w-full custom-input-h bg-surface-container-lowest border border-border-subtle rounded-none px-3 text-text-primary font-mono-code text-body-sm focus:ring-0 focus:border-severity-low transition-colors placeholder:text-text-tertiary/50" id="key" name="key" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between pt-2">
<div class="flex items-center gap-2">
<input class="w-3 h-3 bg-transparent border-border-subtle rounded-none text-severity-low focus:ring-0" id="persist" type="checkbox"/>
<label class="font-mono-code text-label-caps text-text-tertiary uppercase" for="persist">Persist Session</label>
</div>
<a class="font-mono-code text-label-caps text-severity-low hover:brightness-125 transition-all" href="#">Forgot?</a>
</div>
<button class="w-full h-10 bg-severity-low text-on-primary font-mono-code text-label-caps font-bold tracking-widest uppercase transition-all active:opacity-80 hover:brightness-110" type="submit">
          Initiate Sequence
        </button>
</form>
<!-- Technical Metadata Footnote -->
<div class="mt-16 pt-8 border-t border-border-subtle flex flex-col gap-2">
<div class="flex justify-between font-mono-code text-[10px] text-text-tertiary">
<span>NODE ID:</span>
<span class="text-text-secondary">PAI-PR-8829-X</span>
</div>
<div class="flex justify-between font-mono-code text-[10px] text-text-tertiary">
<span>SESSION TOKEN:</span>
<span class="text-text-secondary">NULL_PENDING_AUTH</span>
</div>
<div class="flex justify-between font-mono-code text-[10px] text-text-tertiary">
<span>SYSTEM STATE:</span>
<span class="text-secondary flex items-center gap-1">
<span class="w-1 h-1 bg-secondary inline-block"></span>
            NOMINAL
          </span>
</div>
</div>
</div>
</div>
<!-- Decorative Corner Elements -->
<div class="fixed top-0 left-0 p-4 font-mono-code text-[10px] text-text-tertiary opacity-30 select-none">
    00:00:00:00 // PENTAI_BOOT_LOADER
  </div>
<div class="fixed top-0 right-0 p-4 font-mono-code text-[10px] text-text-tertiary opacity-30 select-none">
    v2.4.0-STABLE // BUILD_ID: 99x-AF
  </div>
